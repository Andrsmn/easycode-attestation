<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд аттестации — EasyCode</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Onest:wght@300;400;500;600&display=swap');
:root{
  --bg:#0d0f14;--surface:#161920;--surface2:#1e2229;--border:#2a2f3a;
  --accent:#5b7fff;--accent2:#ff6b6b;--accent3:#43d99e;--accent4:#ffd166;
  --text:#e8eaf0;--muted:#7a8099;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Onest',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{padding:20px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
#screen-password{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center}
.pw-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;max-width:380px;width:100%}
.pw-box h2{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:900;margin-bottom:8px}
.pw-box p{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.5}
.pw-error{color:var(--accent2);font-size:13px;margin-top:10px;min-height:18px}
.badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--accent);background:rgba(91,127,255,.1);border:1px solid rgba(91,127,255,.25);padding:5px 18px;border-radius:100px;margin-bottom:24px}
.logo{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:900;color:var(--text)}
.logo span{color:var(--accent)}
.topbar-actions{display:flex;gap:10px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;font-family:'Onest',sans-serif;font-size:14px;font-weight:600;padding:10px 22px;border-radius:100px;border:none;cursor:pointer;transition:all .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(91,127,255,.3)}
.btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn.danger{background:rgba(255,107,107,.12);color:var(--accent2);border:1px solid rgba(255,107,107,.25)}
.btn.danger:hover{background:rgba(255,107,107,.2)}

.main{padding:40px;max-width:1200px;margin:0 auto}
h2{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;margin-bottom:24px}

.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state p{font-size:15px;max-width:400px;margin:0 auto;line-height:1.6}

.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:36px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px}
.stat .num{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;color:var(--accent)}
.stat .num.green{color:var(--accent3)}.stat .num.red{color:var(--accent2)}.stat .num.yellow{color:var(--accent4)}
.stat .lbl{font-size:12px;color:var(--muted);margin-top:5px}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:36px}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--surface2);border-bottom:1px solid var(--border)}
th{padding:14px 18px;text-align:left;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{padding:14px 18px;font-size:14px;vertical-align:middle}
.score-pill{display:inline-block;padding:4px 12px;border-radius:100px;font-size:13px;font-weight:700;font-family:'Unbounded',sans-serif}
.score-high{background:rgba(67,217,158,.12);color:var(--accent3);border:1px solid rgba(67,217,158,.25)}
.score-mid{background:rgba(255,209,102,.1);color:var(--accent4);border:1px solid rgba(255,209,102,.25)}
.score-low{background:rgba(255,107,107,.1);color:var(--accent2);border:1px solid rgba(255,107,107,.25)}
.tg-link{color:var(--accent);text-decoration:none;font-size:13px}
.tg-link:hover{text-decoration:underline}
.date-cell{color:var(--muted);font-size:13px}

/* DETAIL PANEL */
#detail-panel{display:none;position:fixed;top:0;right:0;width:580px;height:100vh;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;z-index:100;flex-direction:column}
#detail-panel.open{display:flex}
.dp-header{padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:10}
.dp-name{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:900}
.dp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;padding:4px}
.dp-close:hover{color:var(--text)}
.dp-body{padding:24px 28px;flex:1}
.dp-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.dp-meta-item{background:var(--surface2);border-radius:8px;padding:12px 16px}
.dp-meta-item .ml{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.dp-meta-item .mv{font-size:15px;font-weight:600}
.dp-section-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.answer-item{border-radius:10px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border)}
.answer-item.a-correct{border-left:3px solid var(--accent3)}
.answer-item.a-open{border-left:3px solid var(--accent)}
.answer-item.a-wrong{border-left:3px solid var(--accent2)}
.answer-item.a-skip{border-left:3px solid var(--border)}
.a-block{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.a-q{font-size:14px;font-weight:500;margin-bottom:8px;line-height:1.5}
.a-lbl{font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600}
.a-val{font-size:13px;background:var(--bg);border-radius:7px;padding:8px 10px;margin-bottom:6px;line-height:1.5;color:var(--text)}
.a-ref{font-size:13px;background:rgba(67,217,158,.06);border:1px solid rgba(67,217,158,.15);border-radius:7px;padding:8px 10px;color:#b8ffd8;line-height:1.5}
.a-skipped{color:var(--accent2);font-size:13px;font-style:italic}
.a-note-section{margin-top:14px}
.a-note-section label{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px}
.a-note-section textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Onest',sans-serif;font-size:13px;color:var(--text);resize:vertical;min-height:70px;outline:none;transition:border-color .2s}
.a-note-section textarea:focus{border-color:var(--accent)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.fbtn{font-size:11px;padding:4px 12px;border-radius:100px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-family:'Onest',sans-serif;transition:all .15s}
.fbtn.active,.fbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(91,127,255,.08)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.overlay.open{display:block}

@media(max-width:700px){
  .topbar,.main{padding-left:20px;padding-right:20px}
  #detail-panel{width:100%}
}
</style>
</head>
<body>

<div id="screen-password">
  <div class="badge">EasyCode · Аттестация</div>
  <h1 style="font-family:'Unbounded',sans-serif;font-size:clamp(22px,4vw,40px);font-weight:900;margin-bottom:32px;background:linear-gradient(135deg,#fff 30%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Дашборд руководителя</h1>
  <div class="pw-box">
    <h2>🔐 Доступ закрыт</h2>
    <p>Этот раздел только для руководителей. Введите пароль для входа.</p>
    <div style="margin-bottom:18px">
      <input type="password" id="pw-inp" placeholder="Введите пароль..." style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-family:'Onest',sans-serif;font-size:15px;color:var(--text);outline:none" onkeydown="if(event.key==='Enter')checkPassword()" />
    </div>
    <button class="btn" style="width:100%;justify-content:center" onclick="checkPassword()">Войти →</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<div id="screen-main" style="display:none">
<div class="topbar">
  <div class="logo">EasyCode <span>·</span> Аттестация</div>
  <div class="topbar-actions">
    <button class="btn secondary" onclick="exportCSV()">⬇ Экспорт CSV</button>
    <button class="btn danger" onclick="clearAll()">🗑 Очистить всё</button>
  </div>
</div>

<div class="main">
  <div id="summary-bar" class="stats-bar"></div>
  <h2 id="table-title">Все прохождения</h2>
  <div id="results-table"></div>
</div>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div id="detail-panel">
  <div class="dp-header">
    <div class="dp-name" id="dp-name">—</div>
    <button class="dp-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<script>
const STORAGE_KEY='easycode_attestation_results';
let allResults=[];
let currentDetail=null;

function load(){
  try{
    allResults=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  }catch(e){allResults=[];}
  render();
}

function render(){
  renderSummary();
  renderTable();
}

function renderSummary(){
  const bar=document.getElementById('summary-bar');
  if(!allResults.length){bar.innerHTML='';return;}
  const total=allResults.length;
  const avg=Math.round(allResults.reduce((s,r)=>s+r.score,0)/total);
  const pass=allResults.filter(r=>r.score>=65).length;
  const fail=total-pass;
  const best=allResults.reduce((a,b)=>a.score>b.score?a:b);
  bar.innerHTML=`
    <div class="stat"><div class="num">${total}</div><div class="lbl">Всего прохождений</div></div>
    <div class="stat"><div class="num">${avg}%</div><div class="lbl">Средний балл</div></div>
    <div class="stat"><div class="num green">${pass}</div><div class="lbl">Прошли (≥65%)</div></div>
    <div class="stat"><div class="num red">${fail}</div><div class="lbl">Не прошли (&lt;65%)</div></div>
    <div class="stat"><div class="num yellow">${best.score}%</div><div class="lbl">Лучший результат</div></div>
  `;
}

function renderTable(){
  const wrap=document.getElementById('results-table');
  const title=document.getElementById('table-title');
  if(!allResults.length){
    title.textContent='Пока нет результатов';
    wrap.innerHTML=`<div class="empty-state">
      <div class="icon">📋</div>
      <p>Здесь будут появляться результаты сотрудников после прохождения аттестации.<br><br>Откройте файл <strong>attestation_test.html</strong> и поделитесь им с командой.</p>
    </div>`;
    return;
  }
  title.textContent=`Все прохождения (${allResults.length})`;
  const sorted=[...allResults].sort((a,b)=>b.id-a.id);
  wrap.innerHTML=`<div class="table-wrap"><table>
    <thead><tr>
      <th>Сотрудник</th><th>Telegram</th><th>Отдел</th><th>Результат</th><th>Верных</th><th>Ошибок</th><th>Открытых</th><th>Время</th><th>Дата</th>
    </tr></thead>
    <tbody>
    ${sorted.map((r,i)=>{
      const cls=r.score>=85?'score-high':r.score>=65?'score-mid':'score-low';
      return `<tr onclick="openDetail(${allResults.indexOf(r)})">
        <td><strong>${esc(r.name)}</strong></td>
        <td><a class="tg-link" href="https://t.me/${r.tg.replace('@','')}" target="_blank" onclick="event.stopPropagation()">${esc(r.tg)}</a></td>
        <td>${esc(r.dept||'—')}</td>
        <td><span class="score-pill ${cls}">${r.score}%</span></td>
        <td style="color:var(--accent3)">${r.correct}</td>
        <td style="color:var(--accent2)">${r.wrong}</td>
        <td style="color:var(--accent4)">${r.open}</td>
        <td class="date-cell">⏱ ${r.timeSpent}</td>
        <td class="date-cell">${r.date}</td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function openDetail(idx){
  currentDetail=idx;
  const r=allResults[idx];
  document.getElementById('dp-name').textContent=r.name+' '+r.tg;
  const body=document.getElementById('dp-body');
  const cls=r.score>=85?'score-high':r.score>=65?'score-mid':'score-low';
  const savedNotes=getNotes(r.id);

  body.innerHTML=`
    <div class="dp-meta">
      <div class="dp-meta-item"><div class="ml">Результат</div><div class="mv"><span class="score-pill ${cls}">${r.score}%</span></div></div>
      <div class="dp-meta-item"><div class="ml">Отдел</div><div class="mv">${esc(r.dept||'—')}</div></div>
      <div class="dp-meta-item"><div class="ml">Время</div><div class="mv">⏱ ${r.timeSpent}</div></div>
      <div class="dp-meta-item"><div class="ml">Дата</div><div class="mv">${r.date}</div></div>
      <div class="dp-meta-item"><div class="ml">Верных / Ошибок</div><div class="mv"><span style="color:var(--accent3)">${r.correct}</span> / <span style="color:var(--accent2)">${r.wrong}</span></div></div>
      <div class="dp-meta-item"><div class="ml">Открытых / Пропущено</div><div class="mv"><span style="color:var(--accent4)">${r.open}</span> / <span style="color:var(--muted)">${r.skipped}</span></div></div>
    </div>

    <div class="a-note-section" style="margin-bottom:24px">
      <label>📝 Комментарий руководителя</label>
      <textarea id="manager-note" placeholder="Введите комментарий для сотрудника или план дообучения...">${esc(savedNotes.general||'')}</textarea>
      <button class="btn" style="margin-top:8px;font-size:13px;padding:8px 18px" onclick="saveNote(${r.id})">Сохранить комментарий</button>
    </div>

    <div class="dp-section-title">Все ответы сотрудника</div>
    <div class="filter-bar" id="dp-filter">
      <button class="fbtn active" onclick="filterDP('all',this)">Все</button>
      <button class="fbtn" onclick="filterDP('wrong',this)">❌ Ошибки</button>
      <button class="fbtn" onclick="filterDP('open',this)">🔵 Открытые</button>
      <button class="fbtn" onclick="filterDP('skip',this)">⬜ Пропущены</button>
      <button class="fbtn" onclick="filterDP('correct',this)">✅ Верные</button>
    </div>
    <div id="dp-answers"></div>
  `;

  filterDP('all',document.querySelector('#dp-filter .fbtn.active'));
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function filterDP(filter,btn){
  document.querySelectorAll('#dp-filter .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const r=allResults[currentDetail];
  if(!r)return;
  const savedNotes=getNotes(r.id);
  let answers=r.answers||[];
  if(filter==='wrong') answers=answers.filter(a=>a.correct===false&&!a.skipped);
  else if(filter==='open') answers=answers.filter(a=>a.correct===null);
  else if(filter==='skip') answers=answers.filter(a=>a.skipped);
  else if(filter==='correct') answers=answers.filter(a=>a.correct===true);

  const container=document.getElementById('dp-answers');
  if(!answers.length){container.innerHTML='<div style="color:var(--muted);font-size:14px;padding:20px 0">Нет вопросов в этой категории</div>';return;}
  container.innerHTML=answers.map((a,i)=>{
    let cls='a-open',icon='🔵';
    if(a.skipped){cls='a-skip';icon='⬜';}
    else if(a.type==='choice'){cls=a.correct?'a-correct':'a-wrong';icon=a.correct?'✅':'❌';}
    const noteKey=`q_${r.answers.indexOf(a)}`;
    const qNote=savedNotes[noteKey]||'';
    const userPart=a.skipped?'<div class="a-skipped">Пропущен</div>':`<div class="a-lbl">Ответ сотрудника</div><div class="a-val">${esc(a.userAnswer||'—')}</div>`;
    const refPart=(!a.correct||a.type==='open')?`<div class="a-lbl" style="color:var(--accent3)">Эталонный ответ</div><div class="a-ref">${esc(a.correctAnswer)}</div>`:'';
    const noteIdx=r.answers.indexOf(a);
    const notePart=`<div class="a-note-section"><label>Заметка по вопросу</label><textarea placeholder="Пометка для дообучения..." onchange="saveQNote(${r.id},${noteIdx},this.value)">${esc(qNote)}</textarea></div>`;
    return `<div class="answer-item ${cls}">
      <div class="a-block">${esc(a.block)}</div>
      <div class="a-q">${icon} ${esc(a.question)}</div>
      ${userPart}${refPart}${notePart}
    </div>`;
  }).join('');
}

function getNotes(resultId){
  try{return JSON.parse(localStorage.getItem('notes_'+resultId)||'{}');}catch(e){return {};}
}

function saveNote(resultId){
  const val=document.getElementById('manager-note').value;
  const notes=getNotes(resultId);
  notes.general=val;
  localStorage.setItem('notes_'+resultId,JSON.stringify(notes));
  const btn=event.target;
  btn.textContent='✅ Сохранено';
  setTimeout(()=>btn.textContent='Сохранить комментарий',2000);
}

function saveQNote(resultId,qIdx,val){
  const notes=getNotes(resultId);
  notes['q_'+qIdx]=val;
  localStorage.setItem('notes_'+resultId,JSON.stringify(notes));
}

function closeDetail(){
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  currentDetail=null;
}

function exportCSV(){
  if(!allResults.length){alert('Нет данных для экспорта');return;}
  const rows=[['Дата','Имя','Telegram','Отдел','Результат %','Верных','Ошибок','Открытых','Пропущено','Время']];
  allResults.forEach(r=>{
    rows.push([r.date,r.name,r.tg,r.dept||'',r.score,r.correct,r.wrong,r.open,r.skipped,r.timeSpent]);
  });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='attestation_results_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

function clearAll(){
  if(!confirm('Удалить все результаты? Это действие нельзя отменить.'))return;
  localStorage.removeItem(STORAGE_KEY);
  allResults=[];
  render();
}

const MANAGER_PASSWORD = 'easycode-boss2026';

function checkPassword(){
  const val=document.getElementById('pw-inp').value;
  if(val===MANAGER_PASSWORD){
    document.getElementById('screen-password').style.display='none';
    document.getElementById('screen-main').style.display='block';
    load();
  } else {
    document.getElementById('pw-error').textContent='Неверный пароль. Попробуйте ещё раз.';
    document.getElementById('pw-inp').value='';
    document.getElementById('pw-inp').focus();
  }
}

document.getElementById('pw-inp').addEventListener('keydown',function(e){if(e.key==='Enter')checkPassword();});

function load(){
  try{
    allResults=JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
  }catch(e){allResults=[];}
  render();
}
</script>
</div>
</body>
</html>
